
<style>
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; padding: 1rem 0; }
  .card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; }
  .card-header { padding: 14px 16px 10px; border-bottom: 0.5px solid var(--color-border-tertiary); }
  .badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 20px; margin-bottom: 8px; }
  .card-title { font-size: 16px; font-weight: 500; color: var(--color-text-primary); margin: 0 0 3px; }
  .card-sub { font-size: 13px; color: var(--color-text-secondary); margin: 0; }
  .card-body { padding: 12px 16px 14px; }
  .row { display: flex; gap: 8px; margin-bottom: 8px; align-items: flex-start; }
  .label { font-size: 11px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.04em; min-width: 80px; padding-top: 2px; }
  .value { font-size: 13px; color: var(--color-text-primary); line-height: 1.5; }
  .steps { margin: 0; padding: 0; list-style: none; }
  .steps li { display: flex; gap: 8px; font-size: 13px; color: var(--color-text-primary); line-height: 1.5; margin-bottom: 5px; }
  .step-num { background: var(--color-background-secondary); border-radius: 50%; width: 20px; height: 20px; min-width: 20px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; color: var(--color-text-secondary); }
  .divider { border: none; border-top: 0.5px solid var(--color-border-tertiary); margin: 10px 0; }
  .tip { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 8px 12px; font-size: 12px; color: var(--color-text-secondary); display: flex; gap: 6px; align-items: flex-start; }
